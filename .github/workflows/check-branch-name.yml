name: Check Branch Name

on:
  pull_request:
    branches: ['*']

jobs:
  check-branch-name:
    runs-on: ubuntu-latest
    steps:
      - name: Validate branch name
        run: |
          branch="${{ github.head_ref }}"
          echo "Branch name: $branch"
          if [[ "$branch" == "develop" || "$branch" == "main" ]]; then
            echo "Branch '$branch' is a core Git-Flow branch. Bypassing naming validation."
            exit 0
          fi
          if ! echo "$branch" | grep -qE '^(feat|fix|hotfix|chore|docs|refactor|test|release)/.+'; then
            echo "Invalid branch name: '$branch'"
            echo "Must follow: <type>/<description>"
            echo "Types: feat, fix, hotfix, chore, docs, refactor, test, release"
            exit 1
          fi
          echo "Branch name is valid"
      - name: Enforce Git-Flow (Only allow develop to main)
        run: |
          target_branch="${{ github.base_ref }}"
          source_branch="${{ github.head_ref }}"
          echo "Target branch: $target_branch"
          echo "Source branch: $source_branch"

          if [[ "$target_branch" == "main" && "$source_branch" != "develop" ]]; then
            echo "ERROR: Violación de Git-Flow. Solo se permiten Pull Requests hacia 'main' desde la rama 'develop'."
            exit 1
          fi
          echo "Git-Flow branch alignment is valid."