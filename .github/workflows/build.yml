name: Build and Validate ML Model

on:
  workflow_dispatch:
  push:
    branches:
      - develop

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:      
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Train and Extract ML Artifacts (Provisional)
        run: |
          mkdir -p backend/ia/models
          # Creamos un binario falso temporal para que el paso de la Release no falle
          echo "Mock Model Data" > backend/ia/models/modelo_ganador.pkl
          
      - name: Run Model Validation Tests
        run: |
          # Actualizada la ruta a la nueva carpeta unificada tests/
          PYTHONPATH=. pytest tests/model_tests/test_scoring.py

      - name: Upload Model to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            backend/ia/models/modelo_ganador.pkl
          tag_name: model-v${{ github.run_number }}
          body: "Modelo de Location Intelligence entrenado y validado el ${{ github.event.head_commit.timestamp }}"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}